<!DOCTYPE html>
<html>
<head>
    <title>Shaadi.com Profile Form</title>
</head>
<body>
    <h1 align="center">Shaadi.com Profile Registration</h1>
    <hr>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <label>Full Name:</label>
            <input type="text" name="fullname">
            <br><br>
            <label>Email:</label>
            <input type="email" name="email">
            <br><br>
            <label>Date of Birth:</label>
            <input type="date" name="dob">
            <br><br>
            <label>Phone Number:</label>
            <input type="tel" name="phone">
            <br><br>
            <label>City:</label>
            <input type="text" name="city">
        </fieldset>
        <br>
        <fieldset>
            <legend>Gender</legend>
            <input type="radio" name="gender" value="male">
            <label>Male</label>
            <input type="radio" name="gender" value="female">
            <label>Female</label>
            <input type="radio" name="gender" value="other">
            <label>Other</label>
        </fieldset>
        <br>
        <fieldset>
            <legend>Interests</legend>
            <input type="checkbox" name="interest" value="travel">
            <label>Traveling</label><br>
            <input type="checkbox" name="interest" value="music">
            <label>Music</label><br>
            <input type="checkbox" name="interest" value="sports">
            <label>Sports</label><br>
            <input type="checkbox" name="interest" value="reading">
            <label>Reading</label>
        </fieldset>
        <br>
        <fieldset>
            <legend>Education & Profession</legend>
            <label>Highest Qualification:</label>
            <select>
                <option>B.Tech</option>
                <option>BCA</option>
                <option>BBA</option>
                <option>M.Tech</option>
                <option>MBA</option>
            </select>
            <br><br>
            <label>Occupation:</label>
            <input type="text" name="occupation">
        </fieldset>
        <br>
        <fieldset>
            <legend>Profile Photo</legend>
            <label>Upload Photo:</label>
            <input type="file" name="photo">
        </fieldset>
        <br>
        <fieldset>
            <legend>About Yourself</legend>
            <textarea rows="5" cols="40"></textarea>
        </fieldset>
        <br>
        <input type="submit" value="Create Profile">
        <input type="reset" value="Clear Form">
    </form>
    <hr>
    <footer  align="center" >
        <small>2026 Shaadi.com Registration Form</small>
    </footer>
</body>
</html>
